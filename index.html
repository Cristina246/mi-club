<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Colibrí - Arte e Identidad</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; min-height: 100vh; overflow-x: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: rgba(0, 0, 0, 0.95); position: fixed; top: 0; width: 100%; z-index: 100; border-bottom: 2px solid #4facfe; }
        nav { display: flex; gap: 15px; flex-wrap: wrap; justify-content: flex-end; }
        nav a { color: #fff; text-decoration: none; font-weight: 600; font-size: 0.85rem; transition: color 0.3s; }
        nav a:hover { color: #00f2fe; }
        section { padding: 200px 20px; text-align: center; border-bottom: 1px solid #222; }
        h2 { color: #00f2fe; margin-bottom: 20px; font-size: 2.5rem; }
        .contenedor-presentacion { max-width: 800px; margin: 0 auto; line-height: 1.7; }
    </style>
</head>
<body>

<header>
    <img src="imageLOGO (1).png" alt="Logo" style="height: 50px;">
    <nav>
        <a href="#inicio">Inicio</a>
        <a href="#quienes-somos">¿Quiénes somos?</a>
        <a href="#museo">Museo</a>
        <a href="#clases">Clases</a>
        <a href="#eventos">Eventos</a>
        <a href="#especiales">Kits</a>
        <a href="#videos">Videos y Vivencias</a>
        <a href="#tienda">Tienda</a>
        <a href="#contacto">Contacto</a>
    </nav>
</header>

<main id="inicio" style="background-image: url('solfon.jpg'); background-size: cover; background-position: center; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: white; padding-top: 80px;">
    <div style="margin-bottom: 20px;">
        <h1 style="font-size: 3rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">Club Colibrí</h1>
        <h3 style="font-size: 1.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">Alas y Raíces</h3>
    </div>
    <div style="border: 4px solid #4facfe; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
        <video id="avatarVideo" width="400" height="auto" controls>
            <source src="Avatar_IV_Video (1) (1).mp4" type="video/mp4">
            Tu navegador no soporta videos.
        </video>
    </div>
</main>

<section id="museo">
    <h2>Museo Digital</h2>
    <p>Un espacio dedicado a nuestra historia, arte y artesanías.</p>
</section>

</body>
</html>
