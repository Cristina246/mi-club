<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Colibrí</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: sans-serif; overflow: hidden; color: white; }
        
        /* Video de fondo */
        .video-fondo {
            position: fixed; right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -1; object-fit: cover; opacity: 0.6;
        }

        /* Contenedor principal */
        .contenedor {
            position: relative; height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; z-index: 1;
        }

        /* Tu Avatar o Video Principal */
        .avatar {
            width: 300px; height: auto;
            border-radius: 20px; box-shadow: 0 0 20px rgba(255,255,255,0.3);
            margin-bottom: 20px;
        }

        /* Animación flotante para el Colibrí */
        .colibri {
            position: absolute; top: 10%; right: 15%;
            width: 120px; height: auto;
            animation: flotar 3s ease-in-out infinite;
        }

        @keyframes flotar {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* Botón de reproducción */
        .btn-reproducir {
            padding: 15px 30px; font-size: 1.2rem; font-weight: bold;
            color: #fff; background: linear-gradient(45deg, #ff416c, #ff4b2b);
            border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4);
            transition: transform 0.2s;
        }
        .btn-reproducir:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <video class="video-fondo" autoplay loop muted playsinline>
        <source src="fondoout_glitch_art.mp4" type="video/mp4">
    </video>

    <img class="colibri" src="hummingbird-animation.gif" alt="Colibrí">

    <div class="contenedor">
        <video id="miAvatar" class="avatar" loop muted playsinline>
            <source src="Avatar_IV_Video (1) (1).mp4" type="video/mp4">
        </video>

        <button id="botonActivar" class="btn-reproducir">ENTRAR AL CLUB</button>

        <audio id="miMusica" loop>
            <source src="FRECUENCIA DE PODER (2).mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const boton = document.getElementById('botonActivar');
        const musica = document.getElementById('miMusica');
        const avatar = document.getElementById('miAvatar');

        boton.addEventListener('click', () => {
            if (musica.paused) {
                musica.play();
                avatar.muted = false; // Quita el silencio al avatar si tiene sonido propio
                avatar.play();        // El avatar empieza a moverse/cantar junto con la música
                boton.innerText = "PAUSAR MÚSICA";
                boton.style.background = "linear-gradient(45deg, #11998e, #38ef7d)";
            } else {
                musica.pause();
                avatar.pause();
                boton.innerText = "REANUDAR MÚSICA";
                boton.style.background = "linear-gradient(45deg, #ff416c, #ff4b2b)";
            }
        });
    </script>
</body>
</html>
