<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Club Colibrí - Arte e Identidad</title>
    <style>
        body { background: #000; color: white; text-align: center; font-family: sans-serif; margin: 0; }
        .bloque-central { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; }
        .logo-central { width: 250px; height: auto; }
        .btn-reproducir { padding: 15px 30px; cursor: pointer; background: #ff416c; color: white; border: none; border-radius: 25px; font-weight: bold; font-size: 1.2rem; transition: transform 0.2s; }
        .btn-reproducir:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="bloque-central">
        <img class="logo-central" src="imageLOGO (1).png" alt="Logo Club Colibrí">
        <button class="btn-reproducir" onclick="reproducirAlas()">▶ Alas y Raíces</button>
    </div>

    <audio id="audioAlas" src="alas.mp3"></audio>

    <script>
        const audioAlas = document.getElementById('audioAlas');
        function reproducirAlas() { 
            if (audioAlas.paused) {
                audioAlas.play().catch(e => console.log("Esperando interacción..."));
            } else {
                audioAlas.pause();
            }
        }
    </script>
</body>
</html>
